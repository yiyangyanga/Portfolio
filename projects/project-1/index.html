<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>无限画布 · 自定义光标版</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --green: #17f700;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }
        body {
            background:#0a0a0a;
            height:100vh;
            overflow:hidden;
            font-family: system-ui, -apple-system, sans-serif;
            cursor: none;
        }
        canvas { 
            display:block; 
            touch-action:none; 
            cursor: none;
        }
        #cd {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--green);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, opacity 0.2s;
        }
        #cd.xl {
            width: 56px;
            height: 56px;
        }
        #cr {
            position: fixed;
            width: 38px;
            height: 38px;
            border: 1.5px solid var(--green);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: 0.35;
            transition: opacity 0.2s;
        }
        #cl {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            font-size: 9px;
            letter-spacing: 0.18em;
            color: #000;
            background: var(--green);
            padding: 5px 10px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            transform: translate(16px, 16px);
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
        }
        #cl.on {
            opacity: 1;
        }
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: default;
        }
        .lightbox img {
            display: block;
            max-width: 94%;
            max-height: 94vh;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            cursor: pointer;
        }
        .lightbox,
        .lightbox img {
            cursor: none;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="cd"></div>
    <div id="cr"></div>
    <div id="cl">VIEW ↗</div>

    <div class="lightbox" id="lightbox">
        <img id="lightboxImg" src="" alt="" onclick="closeLightbox()">
    </div>

<script>
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }

    const app = {
        canvas: null,
        ctx: null,
        
        cols: 6,
        rows: 8,
        baseW: 300,
        baseH: 400,
        marginX: 20,
        marginY: 20,
        cornerRadius: 28,
        
        offsetX: 0,
        offsetY: 0,
        
        isDragging: false,
        lastX: 0,
        lastY: 0,
        
        velocityX: 0,
        velocityY: 0,
        friction: 0.96,
        
        tiles: [],
        hasDragged: false,

        columnScroll: [],
        scrollSpeed: 1.2,
        
        init() {
            this.canvas = document.getElementById('c');
            this.ctx = this.canvas.getContext('2d');
            // 先准备数据再绘制，避免黑屏
            this.columnScroll = new Array(this.cols).fill(0);
            this.createTiles();
            this.resize();
            this.bindEvents();
            this.startInertiaLoop();
            setTimeout(() => this.resetView(), 100);
        },
        
        resize() {
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            this.draw();
        },
        
        createTiles() {
            this.tiles = [];
            let index = 1;
            const totalImages = 48;
            
            for (let col = 0; col < this.cols; col++) {
                for (let row = 0; row < this.rows; row++) {
                    const off = document.createElement('canvas');
                    off.width = this.baseW;
                    off.height = this.baseH;
                    const ct = off.getContext('2d');
                    
                    ct.fillStyle = '#ffffff';
                    ct.beginPath();
                    ct.roundRect(0, 0, this.baseW, this.baseH, this.cornerRadius);
                    ct.fill();
                    ct.fillStyle = '#555';
                    ct.font = 'bold 32px Arial';
                    ct.textAlign = 'center';
                    ct.textBaseline = 'middle';
                    ct.fillText('300 × 400', this.baseW/2, this.baseH/2);
                    
                    const stagger = (col % 2 === 0) ? 0 : this.baseH * 0.45;
                    const tileId = index;
                    
                    const largeImg = new Image();
                    largeImg.crossOrigin = 'anonymous';
                    largeImg.src = `images/Canvas-${String(tileId).padStart(2, '0')}.jpg`;
                    
                    largeImg.onload = () => {
                        ct.clearRect(0, 0, this.baseW, this.baseH);
                        ct.fillStyle = '#ffffff';
                        ct.beginPath();
                        ct.roundRect(0, 0, this.baseW, this.baseH, this.cornerRadius);
                        ct.fill();
                        ct.save();
                        ct.beginPath();
                        ct.roundRect(0, 0, this.baseW, this.baseH, this.cornerRadius);
                        ct.clip();
                        ct.drawImage(largeImg, 0, 0, this.baseW, this.baseH);
                        ct.restore();
                    };
                    
                    largeImg.onerror = () => {
                        ct.clearRect(0, 0, this.baseW, this.baseH);
                        ct.fillStyle = '#fff';
                        ct.beginPath();
                        ct.roundRect(0, 0, this.baseW, this.baseH, this.cornerRadius);
                        ct.fill();
                        ct.fillStyle = '#555';
                        ct.font = 'bold 32px Arial';
                        ct.textAlign = 'center';
                        ct.textBaseline = 'middle';
                        ct.fillText('300 × 400', this.baseW/2, this.baseH/2 - 15);
                        ct.fillStyle = '#e00';
                        ct.font = 'bold 14px system-ui';
                        ct.fillText('Image Not Found', this.baseW/2, this.baseH/2 + 22);
                    };
                    
                    this.tiles.push({
                        smallImg: off,
                        largeImg: largeImg,
                        stagger: stagger,
                        row: row,
                        id: tileId
                    });
                    
                    index = (index % totalImages) + 1;
                }
            }
        },
        
        bindEvents() {
            window.addEventListener('resize', () => this.resize());
            
            this.canvas.addEventListener('mousedown', e => {
                this.isDragging = true;
                this.hasDragged = false;
                this.velocityX = 0;
                this.velocityY = 0;
                this.lastX = e.clientX;
                this.lastY = e.clientY;
            });
            
            document.addEventListener('mouseup', () => this.isDragging = false);
            
            this.canvas.addEventListener('mousemove', e => {
                if (!this.isDragging) return;
                const dx = e.clientX - this.lastX;
                const dy = e.clientY - this.lastY;
                if (!this.hasDragged && Math.hypot(dx, dy) > 5) this.hasDragged = true;
                this.offsetX += dx;
                this.offsetY += dy;
                this.velocityX = dx * 0.85;
                this.velocityY = dy * 0.85;
                this.lastX = e.clientX;
                this.lastY = e.clientY;
                this.draw();
            });
            
            this.canvas.addEventListener('click', e => {
                if (this.hasDragged) return;
                if (Math.hypot(e.movementX || 0, e.movementY || 0) > 80) return;
                this.checkClick(e.clientX, e.clientY);
            });
            
            let tx = 0, ty = 0;
            this.canvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    this.isDragging = true;
                    this.hasDragged = false;
                    this.velocityX = 0; this.velocityY = 0;
                    tx = e.touches[0].clientX;
                    ty = e.touches[0].clientY;
                }
            }, {passive: false});
            
            this.canvas.addEventListener('touchmove', e => {
                if (!this.isDragging || e.touches.length !== 1) return;
                e.preventDefault();
                const dx = e.touches[0].clientX - tx;
                const dy = e.touches[0].clientY - ty;
                if (!this.hasDragged && Math.hypot(dx, dy) > 5) this.hasDragged = true;
                this.offsetX += dx * 1.25;
                this.offsetY += dy * 1.25;
                this.velocityX = dx * 0.8;
                this.velocityY = dy * 0.8;
                tx = e.touches[0].clientX;
                ty = e.touches[0].clientY;
                this.draw();
            }, {passive: false});
            
            this.canvas.addEventListener('touchend', () => this.isDragging = false);
            
            this.canvas.addEventListener('wheel', e => {
                e.preventDefault();
                let deltaX = e.deltaX, deltaY = e.deltaY;
                if (e.deltaMode === 1) { deltaX *= 16; deltaY *= 16; }
                else if (e.deltaMode === 2) { deltaX *= this.canvas.height; deltaY *= this.canvas.height; }
                this.offsetX -= deltaX;
                this.offsetY -= deltaY;
                this.velocityX = -deltaX * 0.5;
                this.velocityY = -deltaY * 0.5;
                this.draw();
            }, { passive: false });
            
            this.canvas.addEventListener('dblclick', () => this.resetView());
        },
        
        startInertiaLoop() {
            const loop = () => {
                let needsDraw = false;
                if (!this.isDragging && (Math.abs(this.velocityX) > 0.5 || Math.abs(this.velocityY) > 0.5)) {
                    this.offsetX += this.velocityX;
                    this.offsetY += this.velocityY;
                    this.velocityX *= this.friction;
                    this.velocityY *= this.friction;
                    needsDraw = true;
                } else if (!this.isDragging) {
                    for (let c = 0; c < this.cols; c++) {
                        const direction = (c % 2 === 0) ? -1 : 1;
                        this.columnScroll[c] += this.scrollSpeed * direction;
                    }
                    needsDraw = true;
                }
                if (needsDraw) this.draw();
                requestAnimationFrame(loop);
            };
            loop();
        },
        
        checkClick(mx, my) {
            const dw = this.baseW, dh = this.baseH;
            const gridW = this.baseW + this.marginX;
            const gridH = this.baseH + this.marginY;
            const startCol = Math.floor(-this.offsetX / gridW) - 1;
            const startRow = Math.floor(-this.offsetY / gridH) - 2;

            for (let r = startRow; r < startRow + this.rows + 6; r++) {
                for (let c = startCol; c < startCol + this.cols + 4; c++) {
                    const colIdx = ((c % this.cols) + this.cols) % this.cols;
                    const columnOffset = this.columnScroll[colIdx];

                    const rowOffset = Math.floor(columnOffset / gridH);
                    const yOffsetRemainder = columnOffset - rowOffset * gridH;
                    const contentRow = r - rowOffset;

                    const idx = colIdx * this.rows + ((contentRow % this.rows + this.rows) % this.rows);
                    if (idx >= this.tiles.length) continue;
                    const tile = this.tiles[idx];

                    const x = c * gridW + this.offsetX;
                    const y = r * gridH + this.offsetY + tile.stagger + yOffsetRemainder;
                    if (mx > x && mx < x + dw && my > y && my < y + dh) {
                        this.showLightbox(tile);
                        return;
                    }
                }
            }
        },
        
        showLightbox(tile) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightboxImg');
            const img = tile.largeImg;
            
            const generatePlaceholder = (w, h) => {
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(0, 0, w, h, 45);
                ctx.fill();
                ctx.fillStyle = '#555';
                ctx.font = 'bold 110px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${w} × ${h}`, w/2, h/2);
                return canvas;
            };
            
            if (img && img.complete && img.naturalWidth > 0) {
                lbImg.src = img.src;
            } else {
                const placeholderCanvas = generatePlaceholder(1260, 1680);
                lbImg.src = placeholderCanvas.toDataURL();
            }
            lb.style.display = 'flex';
        },
        
        draw() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const dw = this.baseW, dh = this.baseH;
            const gridW = this.baseW + this.marginX;
            const gridH = this.baseH + this.marginY;
            const startCol = Math.floor(-this.offsetX / gridW) - 1;
            const startRow = Math.floor(-this.offsetY / gridH) - 2;

            for (let r = startRow; r < startRow + this.rows + 8; r++) {
                for (let c = startCol; c < startCol + this.cols + 5; c++) {
                    const colIdx = ((c % this.cols) + this.cols) % this.cols;
                    const columnOffset = this.columnScroll[colIdx] || 0;

                    const rowOffset = Math.floor(columnOffset / gridH);
                    const yOffsetRemainder = columnOffset - rowOffset * gridH;

                    const contentRow = r - rowOffset;
                    const idx = colIdx * this.rows + ((contentRow % this.rows + this.rows) % this.rows);
                    if (idx >= this.tiles.length) continue;
                    const tile = this.tiles[idx];

                    const x = c * gridW + this.offsetX;
                    const y = r * gridH + this.offsetY + tile.stagger + yOffsetRemainder;
                    if (x + dw < 0 || x > this.canvas.width || y + dh < 0 || y > this.canvas.height) continue;
                    this.ctx.drawImage(tile.smallImg, x, y, dw, dh);
                }
            }
        },
        
        resetView() {
            this.offsetX = (this.canvas.width - this.cols * (this.baseW + this.marginX)) / 2;
            this.offsetY = (this.canvas.height - this.rows * (this.baseH + this.marginY)) / 2 - 100;
            this.velocityX = 0; this.velocityY = 0;
            this.draw();
        }
    };

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    (function initCustomCursor() {
        const cd = document.getElementById('cd');
        const cr = document.getElementById('cr');
        const cl = document.getElementById('cl');
        let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cd.style.left = mouseX + 'px';
            cd.style.top = mouseY + 'px';
            cl.style.left = mouseX + 'px';
            cl.style.top = mouseY + 'px';
        });
        function smoothRing() {
            ringX += (mouseX - ringX) * 0.1;
            ringY += (mouseY - ringY) * 0.1;
            cr.style.left = ringX + 'px';
            cr.style.top = ringY + 'px';
            requestAnimationFrame(smoothRing);
        }
        smoothRing();
        window.setCursor = function(text) {
            if (text) { cl.textContent = text; cl.classList.add('on'); }
            cd.classList.add('xl');
        };
        window.resetCursor = function() {
            cl.textContent = 'VIEW ↗';
            cl.classList.remove('on');
            cd.classList.remove('xl');
        };
    })();

    window.onload = () => app.init();
</script>
</body>
</html>
